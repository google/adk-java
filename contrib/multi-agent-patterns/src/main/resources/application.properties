resources.base.path = src/main/resources
adk.agent.model = gemini-2.5-flash
adk.agent.config.path = /agent-configs
spring.main.allow-bean-definition-overriding=true

adk.content.config.temperature = 0.1
adk.content.config.max.output.tokens = 2000

adk.plugins.rate.limit.requests.per.minute = 5.0
adk.retry.max.attempts = 3
adk.retry.base.delay = 2

tool.maps = tool.maps.agent
tool.search = tool.search.agent
tool.code = tool.code.execution

traveler.root = traveler.root.agent
traveler.dining = traveler.dining.agent
traveler.flight = traveler.flight.agent
traveler.activity = traveler.activity.agent
traveler.itinerary = traveler.itinerary.agent
traveler.accommodation = traveler.accommodation.agent

report.root = report.root.writer
report.topic = report.topic.researcher
report.content = report.content.analyst
report.research = report.research.coordinator

code.root = code.root.agent
code.generator = code.generator.agent
code.converter = code.converter.agent
code.critic = code.critic.agent
code.refactor = code.refactor.agent
code.bundler = code.bundler.agent
code.review = code.review.agent
code.refiner = code.refiner.agent
